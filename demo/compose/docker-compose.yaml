version: '3.9'
services:
  minio-dev:
    image: quay.io/minio/minio
    container_name: minio-dev
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      lakehouse_net:
        ipv4_address: 172.20.193.30
    volumes:
      - minio_storage:/data
    environment:
      MINIO_ROOT_USER: spark_user
      MINIO_ROOT_PASSWORD: spark_pwd
    command: server --console-address ":9001" /data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-dev:
    image: postgres:latest
    container_name: db-dev
    shm_size: 128mb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgresUser
      POSTGRES_PASSWORD: postgresPW
      POSTGRES_DB: postgresDB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgresUser -d postgresDB"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      lakehouse_net:
        ipv4_address: 172.20.193.10

  broker:
    image: apache/kafka:latest
    container_name: broker
    ports:
      - "9092:9092"
    networks:
      lakehouse_net:
        ipv4_address: 172.20.193.20
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://172.20.193.20:9092,CONTROLLER://172.20.193.20:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://172.20.193.20:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@172.20.193.20:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 4

  hive-metastore:
    image: lakehouse-hms:0.4.0
    entrypoint: ["/bin/sh", "-c", "/service.sh"]
    container_name: hive-metastore
    restart: on-failure
    depends_on:
      db-dev:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: spark_user
      AWS_SECRET_ACCESS_KEY: spark_pwd
      HIVE_METASTORE_WAREHOUSE_DIR: s3://data/warehouse
      DATABASE_TYPE: postgres
      HADOOP_CLASSPATH: "/opt/hive/lib/postgresql-42.7.3.jar:/opt/hadoop/share/hadoop/tools/lib/hadoop-aws-3.1.0.jar:/opt/hadoop/share/hadoop/tools/lib/aws-java-sdk-bundle-1.11.271.jar"
    ports:
      - "9083:9083"
    volumes:
      - ./conf_infra/metastore-site.xml:/opt/hive/conf/hive-site.xml
    networks:
      lakehouse_net:
        ipv4_address: 172.20.193.60

  spark-master:
    image: lakehouse-spark-aws:0.4.0
    entrypoint: ["/bin/sh", "-c", "/service.sh"]
    container_name: spark-master
    hostname: spark-master
    environment:
      SPARK_MODE: master
      SPARK_MASTER_WEBUI_PORT: 8400
      SPARK_MASTER_HOSTNAME: 172.20.193.40
      SPARK_PUBLIC_DNS: 172.20.193.40
      SPARK_LOCAL_IP: 0.0.0.0
      SPARK_MASTER_PORT: 7077
      SPARK_MASTER_OPTS: "-Dspark.master.rest.enabled=true"
      AWS_ACCESS_KEY_ID: spark_user
      AWS_SECRET_ACCESS_KEY: spark_pwd
      S3_ENDPOINT: http://172.20.193.30:9000
      S3_TEST_URL: http://172.20.193.30:9001
    ports:
      - "6066:6066"
      - "7077:7077"
      - "8400:8400"
    networks:
      lakehouse_net:
        ipv4_address: 172.20.193.40
    volumes:
      - ./conf_infra/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 2g
    depends_on:
      minio-dev:
        condition: service_healthy
      db-dev:
        condition: service_healthy

  spark-worker-1:
    image: lakehouse-spark-aws:0.4.0
    entrypoint: ["/bin/sh", "-c", "/service.sh"]
    container_name: spark-worker-1
    environment:
      SPARK_MODE: worker
      SPARK_PUBLIC_DNS: 172.20.193.50
      SPARK_LOCAL_IP: 0.0.0.0
      SPARK_WORKER_WEBUI_PORT: 8401
      SPARK_MASTER_URL: spark://172.20.193.40:7077
      SPARK_WORKER_MEMORY: 6g
      SPARK_WORKER_CORES: 4
      SPARK_WORKER_HOSTNAME: 172.20.193.50
      AWS_ACCESS_KEY_ID: spark_user
      AWS_SECRET_ACCESS_KEY: spark_pwd
      S3_ENDPOINT: http://172.20.193.30:9000
      S3_TEST_URL: http://172.20.193.30:9001
    ports:
      - "8401:8401"
      - "4040:4040"
      - "4041:4041"
      - "4042:4042"
    networks:
      lakehouse_net:
        ipv4_address: 172.20.193.50
    volumes:
      - ./conf_infra/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
      - ./conf_infra/log4j2.properties:/opt/spark/conf/log4j2.properties
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8g
    depends_on:
      spark-master:
        condition: service_started

  spark-history:
    image: lakehouse-spark-aws:0.4.0
    entrypoint: ["/bin/sh", "-c", "/service.sh"]
    container_name: spark-history
    environment:
      AWS_ACCESS_KEY_ID: spark_user
      AWS_SECRET_ACCESS_KEY: spark_pwd
      S3_ENDPOINT: http://172.20.193.30:9000
      S3_TEST_URL: http://172.20.193.30:9001
      SPARK_MODE: history
    ports:
      - "18080:18080"
    networks:
      lakehouse_net:
        ipv4_address: 172.20.193.70
    volumes:
      - ./conf_infra/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4g

  conf-svc:
    image: lakehouse:0.4.0
    container_name: conf-svc
    ports:
      - "8080:8080"
    networks:
      lakehouse_net:
        ipv4_address: 172.20.193.80
    command: >
      bash -c "java
      -Dspring.datasource.url=jdbc:postgresql://db-dev:5432/postgresDB?ApplicationName=ConfigSVC
      -Dlakehouse.config.schedule.send.kafka.producer.properties.bootstrap.servers=broker:9092
      -jar /opt/lakehouse-config-svc-0.4.0-jar-with-dependencies.jar"
    depends_on:
      db-dev:
        condition: service_healthy
      broker:
        condition: service_started

  scheduler-svc:
    image: lakehouse:0.4.0
    container_name: scheduler-svc
    ports:
      - "8081:8081"
    networks:
      lakehouse_net:
        ipv4_address: 172.20.193.90
    command: >
      bash -c "java
      -Dspring.datasource.url=jdbc:postgresql://db-dev:5432/postgresDB?ApplicationName=SchedulerSVC 
      -Dlakehouse.scheduler.schedule.task.kafka.producer.properties.bootstrap.servers=broker:9092 
      -Dlakehouse.scheduler.config.schedule.kafka.consumer.properties.bootstrap.servers=broker:9092 
      -Dlakehouse.scheduler.registration.delay-ms=5000 
      -Dlakehouse.scheduler.run.delay-ms=5000 
      -Dlakehouse.scheduler.resolvedeps.delay-ms=5000 
      -Dlakehouse.client.rest.config.server.url=http://conf-svc:8080 
      -jar /opt/lakehouse-scheduler-svc-0.4.0-jar-with-dependencies.jar"
    depends_on:
      db-dev:
        condition: service_healthy
      broker:
        condition: service_started
      conf-svc:
        condition: service_started

  state-svc:
    image: lakehouse:0.4.0
    container_name: state-svc
    ports:
      - "8082:8082"
    networks:
      lakehouse_net:
        ipv4_address: 172.20.193.100
    command: >
      bash -c "java
      -Dspring.datasource.url=jdbc:postgresql://db-dev:5432/postgresDB?ApplicationName=StateSVC
      -jar /opt/lakehouse-state-svc-0.4.0-jar-with-dependencies.jar"
    depends_on:
      db-dev:
        condition: service_healthy

  lakehouse-task-executor-svc-1:
    image: lakehouse:0.4.0
    container_name: task-executor-svc-1
    hostname: task-executor-svc-1
    ports:
      - "8091:8091"
    networks:
      lakehouse_net:
        ipv4_address: 172.20.193.110
    command: [
      "java",
      "-Dserver.port=8091",
      "-Dlakehouse.client.rest.config.server.url=http://conf-svc:8080",
      "-Dlakehouse.client.rest.scheduler.server.url=http://scheduler-svc:8081",
      "-Dlakehouse.client.rest.state.server.url=http://state-svc:8082",
      "-Dlakehouse.task-executor.scheduled.task.kafka.consumer.properties.group.id=database",
      "-Dlakehouse.task-executor.service.id=database",
      "-Dlakehouse.task-executor.scheduled.task.kafka.consumer.concurrency=1",
      "-Dlakehouse.task-executor.scheduled.task.kafka.consumer.properties.bootstrap.servers=broker:9092",
      "-jar", "/opt/lakehouse-task-executor-svc-0.4.0-jar-with-dependencies.jar"
    ]
    depends_on:
      broker:
        condition: service_started
      conf-svc:
        condition: service_started
      scheduler-svc:
        condition: service_started
      state-svc:
        condition: service_started

  lakehouse-task-executor-svc-2:
    image: lakehouse:0.4.0
    container_name: task-executor-svc-2
    hostname: task-executor-svc-2
    networks:
      lakehouse_net:
        ipv4_address: 172.20.193.130
    ports:
      - "8092:8092"
    command: [
      "java",
      "-Dserver.port=8092",
      "-Dlakehouse.client.rest.config.server.url=http://conf-svc:8080",
      "-Dlakehouse.client.rest.scheduler.server.url=http://scheduler-svc:8081",
      "-Dlakehouse.client.rest.state.server.url=http://state-svc:8082",
      "-Dlakehouse.task-executor.scheduled.task.kafka.consumer.properties.group.id=spark-cluster",
      "-Dlakehouse.task-executor.service.id=spark-exec-1",
      "-Dlakehouse.task-executor.scheduled.task.kafka.consumer.concurrency=1",
      "-Dlakehouse.task-executor.scheduled.task.kafka.consumer.properties.bootstrap.servers=broker:9092",
      "-jar", "/opt/lakehouse-task-executor-svc-0.4.0-jar-with-dependencies.jar"
    ]
    depends_on:
      broker:
        condition: service_started
      conf-svc:
        condition: service_started
      scheduler-svc:
        condition: service_started
      state-svc:
        condition: service_started

  lakehouse-task-executor-svc-3:
    image: lakehouse:0.4.0
    container_name: task-executor-svc-3
    hostname: task-executor-svc-3
    networks:
      lakehouse_net:
        ipv4_address: 172.20.193.140
    ports:
      - "8093:8093"
    command: [
      "java",
      "-Dserver.port=8093",
      "-Dlakehouse.client.rest.config.server.url=http://conf-svc:8080",
      "-Dlakehouse.client.rest.scheduler.server.url=http://scheduler-svc:8081",
      "-Dlakehouse.client.rest.state.server.url=http://state-svc:8082",
      "-Dlakehouse.task-executor.scheduled.task.kafka.consumer.properties.group.id=state-service",
      "-Dlakehouse.task-executor.service.id=state-service",
      "-Dlakehouse.task-executor.scheduled.task.kafka.consumer.concurrency=1",
      "-Dlakehouse.task-executor.scheduled.task.kafka.consumer.properties.bootstrap.servers=broker:9092",
      "-jar", "/opt/lakehouse-task-executor-svc-0.4.0-jar-with-dependencies.jar"
    ]
    depends_on:
      broker:
        condition: service_started
      conf-svc:
        condition: service_started
      scheduler-svc:
        condition: service_started
      state-svc:
        condition: service_started

  lakehouse-task-executor-svc-4:
    image: lakehouse:0.4.0
    container_name: task-executor-svc-4
    hostname: task-executor-svc-4
    networks:
      lakehouse_net:
        ipv4_address: 172.20.193.150
    ports:
      - "8094:8094"
    command: [
      "java",
      "-Dserver.port=8094",
      "-Dlakehouse.client.rest.config.server.url=http://conf-svc:8080",
      "-Dlakehouse.client.rest.scheduler.server.url=http://scheduler-svc:8081",
      "-Dlakehouse.client.rest.state.server.url=http://state-svc:8082",
      "-Dlakehouse.task-executor.scheduled.task.kafka.consumer.properties.group.id=spark-cluster",
      "-Dlakehouse.task-executor.service.id=spark-exec-2",
      "-Dlakehouse.task-executor.scheduled.task.kafka.consumer.concurrency=1",
      "-Dlakehouse.task-executor.scheduled.task.kafka.consumer.properties.bootstrap.servers=broker:9092",
      "-jar", "/opt/lakehouse-task-executor-svc-0.4.0-jar-with-dependencies.jar"
    ]
    depends_on:
      broker:
        condition: service_started
      conf-svc:
        condition: service_started
      scheduler-svc:
        condition: service_started
      state-svc:
        condition: service_started

  trino:
    image: "trinodb/trino:478"
    ports:
      - "9090:8080"
    volumes:
      - ./conf_infra/trino/etc:/usr/lib/trino/etc:ro
      - ./conf_infra/trino/catalog:/etc/trino/catalog
    networks:
      lakehouse_net:
        ipv4_address: 172.20.193.120
    depends_on:
      hive-metastore:
        condition: service_started
      minio-dev:
        condition: service_healthy
      broker:
        condition: service_started

volumes:
  minio_storage:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "./storages/minio_storage"

networks:
  lakehouse_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.193.0/24