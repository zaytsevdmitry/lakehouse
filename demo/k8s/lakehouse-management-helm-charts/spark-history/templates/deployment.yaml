apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-history
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-history
  template:
    metadata:
      labels:
        app: spark-history
    spec:
      containers:
        - name: spark-history
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 18080
              name: http
          env:
            - name: AWS_ACCESS_KEY_ID
              value: {{ .Values.env.awsAccessKeyId | quote }}
            - name: AWS_SECRET_ACCESS_KEY
              value: {{ .Values.env.awsSecretAccessKey | quote }}
            - name: S3_ENDPOINT
              value: {{ .Values.env.s3Endpoint | quote }}
            - name: S3_TEST_URL
              value: {{ .Values.env.s3TestUrl | quote }}
            - name: SPARK_MODE
              value: {{ .Values.env.sparkMode | quote }}
            - name: SPARK_LOCAL_IP
              value: "0.0.0.0"
          command: [ "/bin/sh", "-c" ]
          args: [ "/service.sh" ]
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config-volume
              mountPath: /opt/spark/conf/spark-defaults.conf
              subPath: spark-defaults.conf
      volumes:
        - name: config-volume
          configMap:
            name: spark-history-conf
