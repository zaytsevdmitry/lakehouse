version: '3.9'
services:
  minio-dev:
    image: quay.io/minio/minio
    container_name: minio-dev
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      lakehouse_net:
        ipv4_address: 192.1.193.30
    volumes:
      - minio_storage:/data
    environment:
      MINIO_ROOT_USER: spark_user
      MINIO_ROOT_PASSWORD: spark_pwd
    command: server --console-address ":9001" /data

  db-dev:
    image: postgres
    container_name: db-dev
    # set shared memory limit when using docker-compose
    shm_size: 128mb
    # or set shared memory limit when deploy via swarm stack
    #volumes:
    #  - type: tmpfs
    #    target: /dev/shm
    #    tmpfs:
    #      size: 134217728 # 128*2^20 bytes = 128Mb
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: postgresUser
      POSTGRES_PASSWORD: postgresPW
      POSTGRES_DB: postgresDB
    networks:
      lakehouse_net:
        ipv4_address: 192.1.193.10

  broker:
    image: apache/kafka:latest
    container_name: broker
    ports:
      - 9092:9092
    networks:
      lakehouse_net:
        ipv4_address: 192.1.193.20
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://192.1.193.20:9092,CONTROLLER://192.1.193.20:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://192.1.193.20:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@192.1.193.20:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 100

  createbuckets-dev:
    image: quay.io/minio/mc
    container_name: createbuckets-dev
    depends_on:
      - minio-dev
      - db-dev
    restart: on-failure
    entrypoint: >
      /bin/sh -c "
      sleep 15;
      /usr/bin/mc alias set lakehosusestorage http://192.1.193.30:9000 spark_user spark_pwd;
      /usr/bin/mc mb --ignore-existing lakehosusestorage/data;
      /usr/bin/mc mb --ignore-existing lakehosusestorage/sparklogs;
      /usr/bin/mc cp /etc/hosts  lakehosusestorage/sparklogs/eventLog/;
      /usr/bin/mc ls  lakehosusestorage/; 
      /usr/bin/mc ls  lakehosusestorage/ --recursive; 
      exit 0;
      "

  hive-metastore:
    image: lakehouse-hms:0.3.0
    container_name: hive-metastore
    depends_on:
      - createbuckets-dev
      - db-dev
    environment:
      AWS_ACCESS_KEY_ID: spark_user
      AWS_SECRET_ACCESS_KEY: spark_pwd
      HIVE_METASTORE_WAREHOUSE_DIR: s3://data/warehouse
    ports:
      - "9083:9083"
    volumes:
      - ./conf_infra/metastore-site.xml:/opt/apache-hive-metastore-3.1.3-bin/conf/metastore-site.xml
    networks:
      lakehouse_net:
        ipv4_address: 192.1.193.60

  spark-master:
    image: lakehouse-spark:0.3.0
    container_name: spark-master
    hostname: spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_WEBUI_PORT=8400
      - SPARK_MASTER_HOSTNAME=192.1.193.40
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_OPTS="-Dspark.master.rest.enabled=true"
    ports:
      - "4040:4040"
      - "6066:6066"
      - "7077:7077"
      - "8400:8400"
    networks:
      lakehouse_net:
        ipv4_address: 192.1.193.40
    volumes:
      - ./conf_infra/spark-defaults.conf:/opt/spark-3.5.7-bin-hadoop3/conf/spark-defaults.conf
    deploy:
      resources:
        limits:
          cpus: "1" # Adjust as needed
          memory: 2g  # Adjust as needed
    depends_on:
      - minio-dev
      - db-dev
      - createbuckets-dev

  spark-worker-1:
    image: lakehouse-spark:0.3.0
    container_name: spark-worker-1
    environment:
      - SPARK_MODE=worker
      - SPARK_WORKER_WEBUI_PORT=8401
      - SPARK_MASTER_URL=spark://192.1.193.40:7077
      - SPARK_WORKER_MEMORY = 3g
      - SPARK_WORKER_CORES = 2
      - SPARK_WORKER_HOSTNAME=192.1.193.50
    ports:
      - "8401:8401"
    networks:
      lakehouse_net:
        ipv4_address: 192.1.193.50
    volumes:
      - ../lakehouse-task-spark-apps/target/lakehouse-task-spark-apps-0.3.0-jar-with-dependencies.jar:/opt/lakehouse-task-spark-apps/lakehouse-task-spark-apps-0.3.0-jar-with-dependencies.jar
      - ../lakehouse-task-spark-dq-app/target/lakehouse-task-spark-dq-app-0.3.0-jar-with-dependencies.jar:/opt/lakehouse-task-spark-dq-app/lakehouse-task-spark-dq-app-0.3.0-jar-with-dependencies.jar
      - ./spark/drivers:/opt/drivers
      - ./conf_infra/spark-defaults.conf:/opt/spark-3.5.7-bin-hadoop3/conf/spark-defaults.conf
    deploy:
      resources:
        limits:
          cpus: "2" # Adjust as needed
          memory: 4g  # Adjust as needed
    depends_on:
      - spark-master

  spark-history:
    image: lakehouse-spark:0.3.0
    container_name: spark-history
    environment:
      AWS_ACCESS_KEY_ID: spark_user
      AWS_SECRET_ACCESS_KEY: spark_pwd
      SPARK_MODE: history
      SPARK_DAEMON_CLASSPATH: /opt/drivers/hadoop-aws-3.3.4.jar:/opt/drivers/aws-java-sdk-bundle-1.12.262.jar:/opt/drivers/wildfly-openssl-1.0.7.Final.jar
    ports:
      - "18080:18080"
    networks:
      lakehouse_net:
        ipv4_address: 192.1.193.70
    volumes:
      - ./spark/drivers:/opt/drivers
      - ./conf_infra/spark-defaults.conf:/opt/spark-3.5.7-bin-hadoop3/conf/spark-defaults.conf
    deploy:
      resources:
        limits:
          cpus: "2" # Adjust as needed
          memory: 4g  # Adjust as needed
    depends_on:
      - createbuckets-dev

  conf-svc:
    image: eclipse-temurin:17
    container_name: conf-svc
    volumes:
      - ../lakehouse-config-svc/target/lakehouse-config-svc-0.3.0-jar-with-dependencies.jar:/opt/lakehouse-config-svc/lakehouse-config-svc-0.3.0-jar-with-dependencies.jar
 #     - ./conf_infra/lakehouse-config-svc/application.yml:/opt/lakehouse-config-svc/application.yml
    ports:
      - "8080:8080"
    networks:
      lakehouse_net:
        ipv4_address: 192.1.193.80
    command: >
      bash -c "java
      -Dspring.datasource.url=jdbc:postgresql://db-dev:5432/postgresDB?ApplicationName=ConfigSVC
      -Dlakehouse.config.schedule.kafka.producer.bootstrap-servers=broker:9092
      -jar /opt/lakehouse-config-svc/lakehouse-config-svc-0.3.0-jar-with-dependencies.jar"
    depends_on:
      - db-dev
      - broker

  scheduler-svc:
    image: eclipse-temurin:17
    container_name: scheduler-svc
    volumes:
      - ../lakehouse-scheduler-svc/target/lakehouse-scheduler-svc-0.3.0-jar-with-dependencies.jar:/opt/lakehouse-scheduler-svc/lakehouse-scheduler-svc-0.3.0-jar-with-dependencies.jar
    ports:
      - "8081:8081"
    networks:
      lakehouse_net:
        ipv4_address: 192.1.193.90
    command: >
      bash -c "java
      -Dspring.datasource.url=jdbc:postgresql://db-dev:5432/postgresDB?ApplicationName=SchedulerSVC 
      -Dlakehouse.scheduler.schedule.task.kafka.producer.properties.bootstrap.servers=broker:9092 
      -Dlakehouse.scheduler.config.schedule.kafka.consumer.properties.bootstrap.servers=broker:9092 
      -Dlakehouse.scheduler.registration.delay-ms=5000 
      -Dlakehouse.scheduler.run.delay-ms=5000 
      -Dlakehouse.scheduler.resolvedeps.delay-ms=5000 
      -Dlakehouse.client.rest.config.server.url=http://conf-svc:8080 
      -jar /opt/lakehouse-scheduler-svc/lakehouse-scheduler-svc-0.3.0-jar-with-dependencies.jar"
    depends_on:
      - db-dev
      - broker
      - conf-svc

  state-svc:
    image: eclipse-temurin:17
    container_name: state-svc
    volumes:
      - ../lakehouse-state-svc/target/lakehouse-state-svc-0.3.0-jar-with-dependencies.jar:/opt/lakehouse-state-svc/lakehouse-state-svc-0.3.0-jar-with-dependencies.jar
    ports:
      - "8082:8082"
    networks:
      lakehouse_net:
        ipv4_address:
          192.1.193.100
    command: >
      bash -c "java
      -Dspring.datasource.url=jdbc:postgresql://db-dev:5432/postgresDB?ApplicationName=StateSVC
      -jar /opt/lakehouse-state-svc/lakehouse-state-svc-0.3.0-jar-with-dependencies.jar"
    depends_on:
      - db-dev

  lakehouse-task-executor-svc-1:
    image: eclipse-temurin:17
    container_name: task-executor-svc-1
    hostname: task-executor-svc-1
    volumes:
      - ../lakehouse-task-executor-svc/target/lakehouse-task-executor-svc-0.3.0-jar-with-dependencies.jar:/opt/lakehouse-task-executor-svc/lakehouse-task-executor-svc-0.3.0-jar-with-dependencies.jar
    ports:
      - "8091:8091"
    networks:
      lakehouse_net:
        ipv4_address: 192.1.193.110
    command: >
      bash -c "java
      --add-exports java.base/sun.nio.ch=ALL-UNNAMED
      --add-opens=java.base/java.nio=ALL-UNNAMED
      -Dserver.port=8091
      -Dlakehouse.client.rest.config.server.url=http://conf-svc:8080
      -Dlakehouse.client.rest.scheduler.server.url=http://scheduler-svc:8081
      -Dlakehouse.client.rest.state.server.url=http://state-svc:8082
      -Dlakehouse.task-executor.scheduled.task.kafka.consumer.properties.group.id=default
      -Dlakehouse.task-executor.service.id=default
      -Dlakehouse.task-executor.scheduled.task.kafka.consumer.concurrency=1
      -Dlakehouse.task-executor.scheduled.task.kafka.consumer.properties.bootstrap.servers=192.1.193.20:9092
      -jar /opt/lakehouse-task-executor-svc/lakehouse-task-executor-svc-0.3.0-jar-with-dependencies.jar"
    depends_on:
      - broker
      - conf-svc
      - scheduler-svc
      - state-svc

volumes:
  minio_storage:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "./minio_storage"

networks:
  lakehouse_net:
    driver: bridge
    ipam:
      config:
        - subnet: 192.1.193.0/24