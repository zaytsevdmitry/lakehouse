apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-pvc
  namespace: {{ .Release.Namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: {{ .Release.Namespace }}
  labels:
    app: minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: quay.io/minio/minio:latest
          imagePullPolicy: IfNotPresent
          args:
            - server
            - /data
            - --console-address
            - :9001
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
          env:
            - name: MINIO_ROOT_USER
              value: "spark_user"
            - name: MINIO_ROOT_PASSWORD
              value: "spark_pwd"
          volumeMounts:
            - mountPath: /data
              name: storage
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 5
        - name: minio-lifecycle-init
          image: minio/mc:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Waiting for local MinIO API to become ready..."
              until nc -z localhost 9000; do
                echo "Waiting for localhost 9000. zzZ"
                sleep 3
              done
              
              echo "MinIO API is up. Configuring client alias..."
              mc alias set localminio http://localhost:9000 spark_user spark_pwd
              
              echo "Executing bucket lifecycle checks..."
              
              if ! mc ls localminio/data > /dev/null 2>&1; then
                echo "Creating bucket: data"
                mc mb localminio/data
              fi
              echo "Ensuring path: data/warehouse/"
              echo -n "" | mc pipe localminio/data/warehouse/.keep

              if ! mc ls localminio/sparklogs > /dev/null 2>&1; then
                echo "Creating bucket: sparklogs"
                mc mb localminio/sparklogs
              fi
              echo "Ensuring path: sparklogs/eventlog/"
              echo -n "" | mc pipe localminio/sparklogs/eventlog/.keep
              
              echo "Storage provisioning completed successfully!"
          resources:
            requests:
              cpu: 10m
              memory: 10Mi

      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: minio-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  ports:
    - port: 9000
      targetPort: 9000
      name: api
    - port: 9001
      targetPort: 9001
      name: console
  selector:
    app: minio
