apiVersion: v1
kind: Service
metadata:
  name: lakehouse-management-state-service
spec:
  type: NodePort # Делаем сервис доступным извне через порт
  ports:
    - port: 8082
      targetPort: 8082
      protocol: TCP
  selector:
    app.kubernetes.io/name: lakehouse-management-state-service
    app.kubernetes.io/instance: {{ .Release.Name }}
