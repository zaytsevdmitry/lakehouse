apiVersion: apps/v1
kind: Deployment
metadata:
  name: lakehouse-management-task-executor-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: lakehouse-management-task-executor-service
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lakehouse-management-task-executor-service
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: task-executor-svc
          image: "lakehouse:0.3.0"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8090
              protocol: TCP
          command: ["bash", "-c"]
          args:
            - "java
            -Dserver.port=8091
            -Dlakehouse.client.rest.config.server.url=http://lakehouse-management-config-service:8080
            -Dlakehouse.client.rest.scheduler.server.url=http://lakehouse-management-scheduler-service:8081
            -Dlakehouse.client.rest.state.server.url=http://lakehouse-management-state-service:8082
            -Dlakehouse.task-executor.scheduled.task.kafka.consumer.properties.group.id=default
            -Dlakehouse.task-executor.service.id=default
            -Dlakehouse.task-executor.scheduled.task.kafka.consumer.concurrency=1
            -Dlakehouse.task-executor.scheduled.task.kafka.consumer.properties.bootstrap.servers=broker:9092
            -jar /opt/lakehouse-task-executor-svc-0.3.0-jar-with-dependencies.jar"
