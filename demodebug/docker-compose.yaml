version: '3.9'

services:

  db:
    image: postgres
    container_name: db
    restart: always
    shm_size: 128mb
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: postgresUser
      POSTGRES_PASSWORD: postgresPW
      POSTGRES_DB: postgresDB
  broker:
    image: apache/kafka:latest
    container_name: broker
    ports:
      - 9092:9092
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://localhost:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 100
  conf-svc:
    image: lakehouse
    container_name: conf-svc
    ports:
      - "8080:8080"
    command: >
      bash -c "java
      -Dspring.datasource.url=jdbc:postgresql://db:5432/postgresDB?ApplicationName=ConfigSVC
      -Dlakehouse.config.schedule.kafka.producer.bootstrap-servers=broker:9092
      -jar /opt/lakehouse-config-svc/lakehouse-config-svc-0.2.0-jar-with-dependencies.jar"
    depends_on:
      - db
      - broker
  scheduler-svc:
    image: lakehouse
    container_name: scheduler-svc
    ports:
      - "8081:8081"
    command: >
      bash -c "java
      -Dspring.datasource.url=jdbc:postgresql://db:5432/postgresDB?ApplicationName=SchedulerSVC 
      -Dlakehouse.scheduler.schedule.task.kafka.producer.properties.bootstrap.servers=broker:9092 
      -Dlakehouse.scheduler.config.schedule.kafka.consumer.properties.bootstrap.servers=broker:9092 
      -Dlakehouse.scheduler.registration.delay-ms=5000 
      -Dlakehouse.scheduler.run.delay-ms=5000 
      -Dlakehouse.scheduler.resolvedeps.delay-ms=5000 
      -Dlakehouse.client.rest.config.server.url=http://conf-svc:8080 
      -jar /opt/lakehouse-scheduler-svc/lakehouse-scheduler-svc-0.2.0-jar-with-dependencies.jar"
    depends_on:
      - db
      - broker
      - conf-svc

  state-svc:
    image: lakehouse
    container_name: state-svc
    ports:
      - "8082:8082"
    command: >
      bash -c "java
      -Dspring.datasource.url=jdbc:postgresql://db:5432/postgresDB?ApplicationName=StateSVC
      -Dlakehouse.config.schedule.kafka.producer.bootstrap-servers=broker:9092
      -jar /opt/lakehouse-state-svc/lakehouse-state-svc-0.2.0-jar-with-dependencies.jar"
    depends_on:
      - db
  lakehouse-task-executor-svc-1:
    image: lakehouse
    container_name: task-executor-svc-1
    hostname: task-executor-svc-1
    ports:
      - "8091:8091"
      - "4041:4041"
    environment:
      SPARK_DRIVER_HOST: task-executor-svc-1
      SPARK_MASTER_HOST: task-executor-svc-1
    command: >
      bash -c "java
      --add-exports java.base/sun.nio.ch=ALL-UNNAMED 
      --add-opens=java.base/java.nio=ALL-UNNAMED 
      -Dserver.port=8091
      -Dlakehouse.client.rest.config.server.url=http://conf-svc:8080
      -Dlakehouse.client.rest.scheduler.server.url=http://scheduler-svc:8081
      -Dlakehouse.client.rest.state.server.url=http://state-svc:8082
      -Dlakehouse.task-executor.scheduled.task.kafka.consumer.properties.group.id=default
      -Dlakehouse.task-executor.service.id=first1
      -Dlakehouse.task-executor.scheduled.task.kafka.consumer.concurrency=1
      -Dlakehouse.task-executor.scheduled.task.kafka.consumer.properties.bootstrap.servers=broker:9092
      -jar /opt/lakehouse-task-executor-svc/lakehouse-task-executor-svc-0.2.0-jar-with-dependencies.jar"
    depends_on:
      - broker
      - conf-svc
      - scheduler-svc
      - state-svc
  lakehouse-task-executor-svc-2:
    image: lakehouse
    container_name: task-executor-svc-2
    hostname: task-executor-svc-2
    ports:
      - "8092:8092"
      - "4042:4042"
    environment:
      SPARK_DRIVER_HOST: task-executor-svc-2
      SPARK_MASTER_HOST: task-executor-svc-2
    command: >
      bash -c "java
      --add-exports java.base/sun.nio.ch=ALL-UNNAMED 
      --add-opens=java.base/java.nio=ALL-UNNAMED 
      -Dserver.port=8092
      -Dlakehouse.client.rest.config.server.url=http://conf-svc:8080
      -Dlakehouse.client.rest.scheduler.server.url=http://scheduler-svc:8081
      -Dlakehouse.client.rest.state.server.url=http://state-svc:8082
      -Dlakehouse.task-executor.scheduled.task.kafka.consumer.properties.group.id=default
      -Dlakehouse.task-executor.service.id=second
      -Dlakehouse.task-executor.scheduled.task.kafka.consumer.concurrency=1
      -Dlakehouse.task-executor.scheduled.task.kafka.consumer.properties.bootstrap.servers=broker:9092
      -jar /opt/lakehouse-task-executor-svc/lakehouse-task-executor-svc-0.2.0-jar-with-dependencies.jar"
    depends_on:
      - broker
      - conf-svc
      - scheduler-svc
      - state-svc
  lakehouse-task-executor-svc-3:
    image: lakehouse
    container_name: task-executor-svc-3
    hostname: task-executor-svc-3
    ports:
      - "8093:8093"
    command: >
      bash -c "java
      --add-exports java.base/sun.nio.ch=ALL-UNNAMED 
      --add-opens=java.base/java.nio=ALL-UNNAMED 
      -Dserver.port=8093
      -Dlakehouse.client.rest.config.server.url=http://conf-svc:8080
      -Dlakehouse.client.rest.scheduler.server.url=http://scheduler-svc:8081
      -Dlakehouse.client.rest.state.server.url=http://state-svc:8082
      -Dlakehouse.task-executor.scheduled.task.kafka.consumer.properties.group.id=state-exe
      -Dlakehouse.task-executor.service.id=state-exe
      -Dlakehouse.task-executor.scheduled.task.kafka.consumer.concurrency=1
      -Dlakehouse.task-executor.scheduled.task.kafka.consumer.properties.bootstrap.servers=broker:9092
      -jar /opt/lakehouse-task-executor-svc/lakehouse-task-executor-svc-0.2.0-jar-with-dependencies.jar"
    depends_on:
      - broker
      - conf-svc
      - scheduler-svc
      - state-svc

volumes:
  minio_storage: {}
